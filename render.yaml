services:
  - type: web
    name: safeblock-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run prisma:generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        value: "*"