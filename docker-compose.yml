services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: safeblock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: safeblock
      POSTGRES_USER: safeblock
      POSTGRES_PASSWORD: safeblock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
